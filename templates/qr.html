<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rumi's QR Code</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'DM Sans',sans-serif;
  background: linear-gradient(135deg, #0e0800, #2d1500, #0e0800);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:40px 20px;
}
.card {
  background:#1a1a1a;
  border-radius:24px;
  padding:40px 36px;
  text-align:center;
  border:2px solid rgba(212,168,67,0.3);
  max-width:380px; width:100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.logo { font-family:'Playfair Display',serif; font-size:36px; color:#D4A843; letter-spacing:2px; }
.sub  { font-size:11px; color:#888; letter-spacing:4px; text-transform:uppercase; margin-top:4px; }
.divider { height:1px; background:rgba(212,168,67,0.2); margin:24px 0; }
.qr-wrap {
  background:#0E0E0E;
  border-radius:16px;
  padding:20px;
  display:inline-block;
  border:2px solid rgba(212,168,67,0.2);
  margin-bottom:20px;
}
.qr-wrap img { width:220px; height:220px; }
.scan-text  { font-size:18px; font-weight:600; color:#F0EDE8; margin-bottom:8px; }
.scan-sub   { font-size:13px; color:#888; line-height:1.5; }
.url-box {
  background:#242424;
  border:1px solid rgba(212,168,67,0.3);
  border-radius:10px;
  padding:10px 16px;
  margin-top:16px;
  font-size:13px;
  color:#D4A843;
  word-break:break-all;
  font-family:monospace;
}
.steps {
  text-align:left;
  margin-top:20px;
  background:#242424;
  border-radius:12px;
  padding:16px;
}
.step { font-size:13px; color:#aaa; padding:4px 0; }
.step span { color:#D4A843; font-weight:600; margin-right:8px; }
.print-btn {
  margin-top:20px;
  background:#D4A843; color:#000;
  border:none; padding:14px 32px;
  border-radius:12px; font-size:15px; font-weight:700;
  cursor:pointer; font-family:'DM Sans',sans-serif;
  width:100%;
}
@media print {
  .print-btn { display:none; }
  body { background:#fff; }
  .card { border:2px solid #D4A843; box-shadow:none; }
}
</style>
</head>

}
</script>
